# dataset.yaml
# YOLOv11 dataset configuration for Cobb 500 Chick Defect Detection
# Generated by scripts/prepare_dataset.py
#
# Class definitions must match detector.py CLASS_NAMES exactly.
# ─────────────────────────────────────────────────────────────────

# Absolute path to the data directory (auto-updated by prepare_dataset.py)
path: /home/<your_user>/chick_defect_project/data

train: images/train
val:   images/val
test:  images/test

# Number of classes
nc: 7

# Class index → class name
names:
  0: Normal
  1: Eye_Abnormality
  2: Deformed_Beak
  3: Knock_Knees
  4: Split_Legs
  5: Bend_Knees
  6: Crooked_Toes
